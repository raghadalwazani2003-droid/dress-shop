<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="igGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4a494;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4b5a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9c5b0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect x="8" y="8" width="84" height="84" rx="20" ry="20" fill="url(#igGrad)"/>
  <!-- inner circle (lens) -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#fff" stroke-width="4"/>
  <!-- center dot -->
  <circle cx="50" cy="50" r="6.5" fill="#fff"/>
  <!-- flash/light indicator -->
  <circle cx="68" cy="27" r="5.5" fill="#fff"/>
</svg>